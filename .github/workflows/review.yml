name: AI Review

on:
  workflow_run:
    workflows: ["PR CI"]
    types: [completed]

jobs:
  review:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run reviewer
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LLM_CONFIG_JSON: ${{ secrets.LLM_CONFIG_JSON }}
        run: |
          python -m app.main review-apply --pr "${{ github.event.workflow_run.pull_requests[0].number }}"